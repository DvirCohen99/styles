{% extends "layout.html" %}
{% block title %}Server Error{% endblock %}
{% block content %}
<div class="flex flex-col items-center justify-center min-h-[50vh] text-center">
  <div class="text-6xl font-bold text-gray-800 mb-4">500</div>
  <div class="text-red-400 mb-4">Internal server error</div>
  {% if error %}
  <div class="text-gray-500 text-xs font-mono bg-gray-900 px-4 py-2 rounded mb-6">{{ error }}</div>
  {% endif %}
  <a href="/" class="text-blue-400 hover:underline text-sm">← Back to dashboard</a>
</div>
{% endblock %}
